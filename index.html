<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>神社抽籤</title>
</head>

<body>

<h1>⛩️ 神社抽籤</h1>

<div id="result">正在抽籤...</div>

<script>

fetch("./omikuji.json")
.then(response => {
    if (!response.ok) {
        throw new Error("找不到 JSON");
    }
    return response.json();
})
.then(data => {

    const random =
    data[Math.floor(Math.random() * data.length)];

    document.getElementById("result").innerHTML =
    `
    ⛩️ 第 ${random.id} 籤<br>
    【${random.luck}】<br>
    <br>
    ${random.oracle}<br>
    <br>
    神諭：${random.message}
    `;

})
.catch(error => {

    document.getElementById("result").innerHTML =
    "❌ JSON讀取失敗：" + error;

});

</script>

</body>
</html>
