<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>神社抽籤 API</title>
</head>

<body>

<div id="result">
正在抽籤...
</div>

<script>

const params = new URLSearchParams(window.location.search);

const user = params.get("user") || "旅人";


fetch("./omikuji.json")
.then(response => response.json())

.then(data => {

    const kuji =
    data[Math.floor(Math.random() * data.length)];


    const result =
`${user} 抽到了！⛩️ 第${kuji.id}籤【${kuji.luck}】 神諭：${kuji.oracle} ${kuji.message}`;


    document.getElementById("result").innerText = result;


})

.catch(error => {

    document.getElementById("result").innerText =
    "抽籤失敗";

});

</script>

</body>
</html>
